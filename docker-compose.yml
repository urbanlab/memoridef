services:
  backend:
    build: ./backend
    image: erasme/memoridef-back:test
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - db_data:/app/data
    environment:
      - UPLOAD_DIR=/app/uploads
      - DB_PATH=/app/data/memoridef.db

  frontend:
    build: ./frontend
    image: erasme/memoridef-front:test
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  uploads:
  db_data:
